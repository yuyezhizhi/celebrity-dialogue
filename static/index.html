<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 名人对话系统</title>
    <link rel="stylesheet" href="/static/style.css?v=14">
    <script src="/static/script.js?v=14"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AI 名人对话</h1>
            <div class="subtitle">让不同大模型驱动的思想家、科学家展开思想交锋</div>
        </header>

        <div class="main-layout">

        <!-- 配置面板 -->
        <div class="config-panel">
            <h2>讨论配置</h2>

            <div class="form-group">
                <label>讨论主题</label>
                <input type="text" id="topic" placeholder="例如：人生的意义是什么？自由意志是否存在？幸福是什么？" value="人生的意义是什么？">
            </div>

            <details class="api-config-toggle" id="api-config-toggle">
                <summary>API 配置（全局，应用到所有名人）</summary>
                <div class="api-config-body">
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="global-apikey" placeholder="sk-... 或留空使用模拟">
                    </div>
                    <div class="form-group">
                        <label>API Base URL</label>
                        <input type="text" id="global-baseurl" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="form-group">
                        <label>模型名称</label>
                        <input type="text" id="global-model" placeholder="gpt-3.5-turbo">
                    </div>
                    <div class="form-group">
                        <label>协议类型</label>
                        <select id="global-provider">
                            <option value="">OpenAI 兼容</option>
                            <option value="anthropic">Anthropic</option>
                        </select>
                    </div>
                </div>
            </details>

            <div class="philosopher-selector">
                <label>选择参与讨论的名人（至少两位，点击头像可分别配置模型）</label>
                <div class="philosopher-list" id="philosopher-list"></div>
            </div>

            <div class="config-row">
                <div class="form-group">
                    <label>最大对话轮次</label>
                    <input type="number" id="max-rounds" value="8" min="2" max="30">
                </div>
            </div>

            <div class="btn-row">
                <button class="btn" id="clear-btn">清空对话</button>
                <button class="btn" id="stop-btn" disabled>停止讨论</button>
                <button class="btn primary" id="start-btn">开始讨论</button>
            </div>
        </div>

        <!-- 对话展示区 -->
        <div class="dialogue-section">
            <h2>名人对话</h2>
            <div class="dialogue-topic" id="dialogue-topic" style="display:none;">
                <div class="topic-label">讨论主题</div>
                <div class="topic-text" id="topic-display"></div>
            </div>
            <div class="dialogue-messages" id="dialogue-messages">
                <div class="empty-state">
                    <div class="icon">&#x1f3db;</div>
                    <div class="text">选择思想家，输入讨论主题，点击「开始讨论」</div>
                    <div class="text" style="font-size:0.8rem;">点击名人的头像可为其配置不同的大模型和思考时间</div>
                </div>
            </div>
            <div class="status-bar" id="dialogue-status"></div>
        </div>

        </div>
    </div>

    <!-- 哲学家配置弹窗 -->
    <div class="philosopher-config-modal" id="config-modal">
        <div class="modal-content">
            <h3 id="modal-title">配置名人模型</h3>
            <div class="form-group">
                <label>AI 模型</label>
                <select id="modal-model">
                    <option value="">模拟模式（无需 API Key）</option>
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    <option value="gpt-4">GPT-4</option>
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4o-mini">GPT-4o Mini</option>
                    <option value="claude-3-opus">Claude 3 Opus</option>
                    <option value="claude-3-sonnet">Claude 3 Sonnet</option>
                    <option value="deepseek-chat">DeepSeek Chat</option>
                    <option value="deepseek-reasoner">DeepSeek Reasoner</option>
                    <option value="qwen-plus">Qwen Plus</option>
                    <option value="qwen-max">Qwen Max</option>
                    <option value="glm-4">GLM-4</option>
                    <option value="moonshot-v1">Moonshot v1</option>
                </select>
            </div>
            <div class="form-group">
                <label>API Key（留空使用模拟模式）</label>
                <input type="password" id="modal-apikey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>API Base URL</label>
                <input type="text" id="modal-baseurl" placeholder="https://api.openai.com/v1">
            </div>
            <div class="config-row">
                <div class="form-group">
                    <label>思考时间（秒）</label>
                    <input type="number" id="modal-thinking-time" value="3" min="1" max="30">
                </div>
                <div class="form-group">
                    <label>Temperature</label>
                    <input type="number" id="modal-temperature" value="0.8" min="0" max="2" step="0.1">
                </div>
            </div>
            <div class="form-group">
                <label>Max Tokens</label>
                <input type="number" id="modal-maxtokens" value="1024" min="100" max="4096">
            </div>
            <div class="form-group">
                <label>System Prompt（角色设定）</label>
                <textarea id="modal-prompt" rows="6"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" id="modal-cancel">取消</button>
                <button class="btn primary" id="modal-save">保存</button>
            </div>
        </div>
    </div>

</body>
</html>
